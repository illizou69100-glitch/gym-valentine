<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>BlackHole</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Blackhole">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="manifest" href="manifest.json">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --surface: #0a0a0a;
      --ring: #2a2a2a;
      --ring-glow: #444;
      --text: #e8e8e8;
      --muted: #8a7340;
      --accent: #d4af6a;
      --gold: #e0b975;
      --gold-dim: #a8854f;
      --hole: radial-gradient(ellipse at 38% 35%, #1a1a1a 0%, #000 55%);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle var(--d) ease-in-out infinite; animation-delay: var(--delay); }
    @keyframes twinkle { 0%, 100% { opacity: var(--base); transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }

    .app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 48px 20px 40px; gap: 0; }

    .header { text-align: center; margin-bottom: 8px; }
    .header h1 { font-size: 22px; font-weight: 600; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; text-shadow: 0 0 20px rgba(224,185,117,0.25); }
    .header p { font-size: 12px; color: var(--gold-dim); margin-top: 4px; letter-spacing: 1px; }

    .hole-wrapper { position: relative; width: 240px; height: 240px; margin: 36px 0 40px; cursor: pointer; -webkit-tap-highlight-color: transparent; }

    .ring { position: absolute; border-radius: 50%; border: 1px solid transparent; top: 50%; left: 50%; transform: translate(-50%, -50%) rotateX(72deg); pointer-events: none; }
    .ring-1 { width: 200px; height: 200px; border-color: #3a2f18; box-shadow: 0 0 12px rgba(212,175,106,0.08); animation: spin 18s linear infinite; }
    .ring-2 { width: 230px; height: 230px; border-color: #2e2512; animation: spin 28s linear infinite reverse; }
    .ring-3 { width: 260px; height: 260px; border-color: #221b0e; animation: spin 40s linear infinite; }

    @keyframes spin { from { transform: translate(-50%, -50%) rotateX(72deg) rotate(0deg); } to { transform: translate(-50%, -50%) rotateX(72deg) rotate(360deg); } }

    .hole-core { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 170px; height: 170px; border-radius: 50%; background: radial-gradient(ellipse at 38% 35%, #141414 0%, #000 60%); box-shadow: 0 0 0 1px #3a2f18, 0 0 40px rgba(0,0,0,0.9), inset 0 0 30px #000; transition: box-shadow 0.3s ease, transform 0.3s ease; }
    .hole-wrapper:hover .hole-core, .hole-wrapper.active .hole-core { box-shadow: 0 0 0 1px #d4af6a, 0 0 60px rgba(212,175,106,0.25), 0 0 100px rgba(212,175,106,0.12), inset 0 0 40px #000; }
    .hole-wrapper.sucking .hole-core { animation: suck 0.6s ease-in-out; }
    @keyframes suck { 0% { transform: translate(-50%, -50%) scale(1); } 30% { transform: translate(-50%, -50%) scale(1.12); box-shadow: 0 0 0 2px #e0b975, 0 0 80px rgba(224,185,117,0.4), inset 0 0 50px #000; } 70% { transform: translate(-50%, -50%) scale(0.92); } 100% { transform: translate(-50%, -50%) scale(1); } }

    .particle { position: absolute; border-radius: 50%; background: #d4af6a; pointer-events: none; animation: suck-particle 0.7s ease-in forwards; }
    @keyframes suck-particle { 0% { opacity: 1; } 100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); } }

    .hint { font-size: 11px; color: #4a3d22; text-align: center; margin-top: -24px; margin-bottom: 32px; letter-spacing: 0.5px; transition: color 0.3s; }
    .hint.ready { color: var(--gold-dim); }

    .input-area { width: 100%; max-width: 380px; }
    .paste-box { display: flex; align-items: center; background: #0c0c0c; border: 1px solid #2e2412; border-radius: 12px; padding: 14px 16px; gap: 10px; transition: border-color 0.2s; }
    .paste-box:focus-within { border-color: var(--gold-dim); }
    .paste-box input { flex: 1; background: none; border: none; outline: none; color: #e0c896; font-size: 14px; font-family: 'Inter', sans-serif; caret-color: var(--gold); }
    .paste-box input::placeholder { color: #4a3d22; }
    .paste-btn { background: none; border: none; color: var(--gold-dim); font-size: 12px; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: color 0.2s, background 0.2s; white-space: nowrap; }
    .paste-btn:hover { color: var(--gold); background: #1a1508; }

    .platforms { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; justify-content: center; }
    .chip { font-size: 10px; letter-spacing: 1px; color: #6b5830; border: 1px solid #2e2412; border-radius: 20px; padding: 4px 10px; text-transform: uppercase; }

    .status-area { margin-top: 28px; width: 100%; max-width: 380px; min-height: 60px; }
    .status-msg { text-align: center; font-size: 13px; color: var(--gold-dim); padding: 12px; display: none; }
    .status-msg.visible { display: block; }
    .result-card { background: #0c0c0c; border: 1px solid #2e2412; border-radius: 14px; padding: 18px; display: none; flex-direction: column; gap: 12px; }
    .result-card.visible { display: flex; }
    .result-title { font-size: 13px; color: var(--gold); font-weight: 500; line-height: 1.4; }
    .result-links { display: flex; flex-direction: column; gap: 8px; }
    .dl-btn { display: flex; align-items: center; justify-content: space-between; background: #110d04; border: 1px solid #3a2f18; border-radius: 10px; padding: 12px 16px; text-decoration: none; color: #cda968; font-size: 13px; transition: border-color 0.2s, background 0.2s; cursor: pointer; }
    .dl-btn:hover { background: #1a1408; border-color: var(--gold); color: var(--gold); }
    .dl-btn .quality { font-size: 11px; color: var(--gold-dim); }
    .error-msg { background: #0f0a0a; border: 1px solid #2a1a1a; border-radius: 12px; padding: 14px 16px; font-size: 12px; color: #664444; display: none; text-align: center; line-height: 1.5; }
    .error-msg.visible { display: block; }

    .loading-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 180px; height: 180px; border-radius: 50%; border: 1px solid transparent; border-top-color: var(--gold); display: none; animation: spin-fast 0.8s linear infinite; pointer-events: none; }
    .hole-wrapper.loading .loading-ring { display: block; }
    @keyframes spin-fast { to { transform: translate(-50%, -50%) rotate(360deg); } }

    .footer { margin-top: auto; padding-top: 40px; font-size: 10px; color: #4a3d22; letter-spacing: 1px; text-align: center; }
  </style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="app">
  <div class="header"><h1>BlackHole</h1><p>Colle un lien &middot; Appuie sur le trou</p></div>
  <div class="hole-wrapper" id="holeBtn">
    <div class="ring ring-1"></div><div class="ring ring-2"></div><div class="ring ring-3"></div>
    <div class="hole-core"></div><div class="loading-ring"></div>
  </div>
  <p class="hint" id="hint">Colle d'abord un lien ci-dessous</p>
  <div class="input-area">
    <div class="paste-box">
      <input type="url" id="urlInput" placeholder="https://..." autocomplete="off" autocorrect="off" spellcheck="false" />
      <button class="paste-btn" id="pasteBtn">Coller</button>
    </div>
    <div class="platforms">
      <span class="chip">YouTube</span><span class="chip">Instagram</span><span class="chip">TikTok</span><span class="chip">X / Twitter</span><span class="chip">Facebook</span>
    </div>
  </div>
  <div class="status-area">
    <p class="status-msg" id="statusMsg"></p>
    <div class="result-card" id="resultCard"><div class="result-title" id="resultTitle"></div><div class="result-links" id="resultLinks"></div></div>
    <div class="error-msg" id="errorMsg"></div>
  </div>
  <div class="footer">BLACKHOLE &middot; DOWNLOADER</div>
</div>
<script>
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div'); s.className = 'star';
    const size = Math.random() * 1.8 + 0.4;
    const base = (Math.random() * 0.4 + 0.05).toFixed(2);
    const dur = (Math.random() * 5 + 3).toFixed(1) + 's';
    const delay = (Math.random() * 6).toFixed(1) + 's';
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${dur};--delay:${delay};--base:${base};opacity:${base};`;
    starsEl.appendChild(s);
  }
  const holeBtn=document.getElementById('holeBtn'),urlInput=document.getElementById('urlInput'),pasteBtn=document.getElementById('pasteBtn'),hint=document.getElementById('hint'),statusMsg=document.getElementById('statusMsg'),resultCard=document.getElementById('resultCard'),resultTitle=document.getElementById('resultTitle'),resultLinks=document.getElementById('resultLinks'),errorMsg=document.getElementById('errorMsg');
  let isLoading=false;
  pasteBtn.addEventListener('click',async()=>{try{const t=await navigator.clipboard.readText();urlInput.value=t;urlInput.dispatchEvent(new Event('input'));}catch{urlInput.focus();}});
  urlInput.addEventListener('input',()=>{const v=urlInput.value.trim();if(v){hint.textContent='Appuie sur le trou noir pour aspirer';hint.className='hint ready';}else{hint.textContent="Colle d'abord un lien ci-dessous";hint.className='hint';}clearResults();});
  holeBtn.addEventListener('click',()=>{if(isLoading)return;const url=urlInput.value.trim();if(!url){urlInput.focus();shakePaste();return;}startDownload(url);});
  function shakePaste(){const b=document.querySelector('.paste-box');b.style.transition='border-color 0.1s';b.style.borderColor='#2a1a1a';setTimeout(()=>b.style.borderColor='',400);}
  function clearResults(){statusMsg.className='status-msg';resultCard.className='result-card';errorMsg.className='error-msg';}
  function spawnParticles(){const r=holeBtn.getBoundingClientRect(),cx=r.width/2,cy=r.height/2;for(let i=0;i<12;i++){const p=document.createElement('div');p.className='particle';const a=Math.random()*Math.PI*2,d=80+Math.random()*40,px=cx+Math.cos(a)*d,py=cy+Math.sin(a)*d,sz=Math.random()*3+1;p.style.cssText=`width:${sz}px;height:${sz}px;left:${px}px;top:${py}px;--tx:${(cx-px)*0.9}px;--ty:${(cy-py)*0.9}px;animation-delay:${Math.random()*0.15}s;animation-duration:${0.5+Math.random()*0.3}s;`;holeBtn.appendChild(p);p.addEventListener('animationend',()=>p.remove());}}
  async function startDownload(url){isLoading=true;holeBtn.classList.add('loading');clearResults();statusMsg.textContent='Aspiration en cours…';statusMsg.className='status-msg visible';spawnParticles();try{const result=await fetchLinks(url);holeBtn.classList.remove('loading');holeBtn.classList.add('sucking');setTimeout(()=>holeBtn.classList.remove('sucking'),700);showResult(result);}catch(err){holeBtn.classList.remove('loading');showError(err.message||'Impossible de traiter ce lien.');}isLoading=false;}
  async function fetchLinks(url){const r=await fetch('https://api.cobalt.tools/',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({url,videoQuality:'1080',audioFormat:'mp3',downloadMode:'auto'})});if(!r.ok)throw new Error('Service indisponible. Réessaie dans un instant.');const d=await r.json();if(d.status==='error'||d.status==='rate-limit')throw new Error(d.error?.code==='error.api.link.unsupported'?'Ce site n\'est pas supporté.':d.error?.code?.replace('error.api.','')||'Lien non reconnu.');if(d.status==='picker')return{title:'Plusieurs médias détectés',links:d.picker.slice(0,6).map((item,i)=>({label:`Média ${i+1}`,quality:item.type||'video',url:item.url}))};if(d.status==='stream'||d.status==='redirect'||d.status==='tunnel')return{title:'Vidéo prête',links:[{label:'Télécharger la vidéo',quality:'meilleure qualité',url:d.url}]};throw new Error('Réponse inattendue du serveur.');}
  function showResult(r){statusMsg.className='status-msg';errorMsg.className='error-msg';resultTitle.textContent=r.title;resultLinks.innerHTML='';r.links.forEach(l=>{const a=document.createElement('a');a.className='dl-btn';a.href=l.url;a.target='_blank';a.rel='noopener noreferrer';a.setAttribute('download','');a.innerHTML=`<span>${l.label}</span><span class="quality">${l.quality}</span>`;resultLinks.appendChild(a);});resultCard.className='result-card visible';}
  function showError(m){statusMsg.className='status-msg';resultCard.className='result-card';errorMsg.textContent=m;errorMsg.className='error-msg visible';}
  document.addEventListener('paste',e=>{const t=(e.clipboardData||window.clipboardData).getData('text');if(t&&t.startsWith('http')){urlInput.value=t;urlInput.dispatchEvent(new Event('input'));}});
</script>
</body>
</html>
